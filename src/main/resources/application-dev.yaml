spring:
  datasource:
#    url: ${DB_URL:jdbc:postgresql://localhost:5432/gestion_commandes_db}
    url: ${DB_URL:jdbc:mysql://localhost:3306/gestion_commandes_db}
#    jdbc:mysql://localhost:3306/gestion_commandes_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:commandes_user}
    password: ${DB_PASSWORD:commandes_pass}
#    driver-class-name: org.postgresql.Driver
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
#        dialect: org.hibernate.dialect.PostgreSQLDialect
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:devsecretkey1234567890abcdefghijklmnopqrstuvwxyz}
    expiration: 86400000  # 24h en ms