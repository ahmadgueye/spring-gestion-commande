services:
  mysql:
    image: mysql:8.0
    container_name: gestion_commandes_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestion_commandes_db
      MYSQL_USER: commandes_user
      MYSQL_PASSWORD: commandes_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: